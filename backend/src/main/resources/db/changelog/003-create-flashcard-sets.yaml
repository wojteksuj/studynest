databaseChangeLog:
  - changeSet:
      id: 003-create-flashcard-sets
      author: wsujczynski
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: flashcard_sets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: creation_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: last_modified_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: flashcard_set_topic_id
                  type: UUID
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: flashcard_sets
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_flashcard_sets_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: flashcard_sets
            baseColumnNames: flashcard_set_topic_id
            referencedTableName: flashcard_set_topics
            referencedColumnNames: id
            constraintName: fk_flashcard_sets_topic
            onDelete: RESTRICT
