databaseChangeLog:
  - changeSet:
      id: 004-create-flashcards
      author: wsujczynski
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: flashcards
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: prompt
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: answer
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: order_index
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: flashcard_set_id
                  type: UUID
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: flashcards
            baseColumnNames: flashcard_set_id
            referencedTableName: flashcard_sets
            referencedColumnNames: id
            constraintName: fk_flashcards_flashcard_set
            onDelete: CASCADE
