services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: studynest_user
      POSTGRES_PASSWORD: studynest_pass
      POSTGRES_DB: studynest
    volumes:
      - studynest_db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: studynest_user
      POSTGRES_PASSWORD: studynest_pass

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  studynest_db_data:
