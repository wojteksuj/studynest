services:
  postgres:
    image: postgres:16
    container_name: studynest-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - studynest_db_data:/var/lib/postgresql/data
    networks:
      - studynest_net

  backend:
    build:
      context: ./backend
    container_name: studynest-backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - studynest_net



  frontend:
    build:
      context: ./frontend
    container_name: studynest-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - studynest_net

volumes:
  studynest_db_data:

networks:
  studynest_net: